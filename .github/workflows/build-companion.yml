name: Build Companion Windows Installer

on:
  push:
    branches:
      - main
    paths:
      - 'companion/**'
      - '.github/workflows/build-companion.yml'
    tags:
      - 'companion-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: companion

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto-bump patch version (rolling latest build)
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $pkgPath = "package.json"
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          $parts = $pkg.version.Split('.')
          $newVersion = "$($parts[0]).$($parts[1]).${{ github.run_number }}"
          Write-Host "Setting companion version to $newVersion"
          $pkg.version = $newVersion
          ($pkg | ConvertTo-Json -Depth 100) | Set-Content $pkgPath -Encoding utf8

      - name: Install companion dependencies
        env:
          ELECTRON_GET_USE_PROXY: "true"
          npm_config_fetch_retries: "5"
          npm_config_fetch_retry_mintimeout: "20000"
          npm_config_fetch_retry_maxtimeout: "120000"
          npm_config_fetch_timeout: "600000"
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          for ($i = 1; $i -le 4; $i++) {
            Write-Host "Attempt $i of 4..."
            npm install
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "npm install failed (exit $LASTEXITCODE), cleaning and retrying in 15s..."
            Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 15
          }
          exit 1

      - name: Build renderer (Vite)
        run: npm run build

      - name: Build Windows installer (NSIS)
        env:
          ELECTRON_GET_USE_PROXY: "true"
          npm_config_fetch_retries: "5"
          npm_config_fetch_retry_mintimeout: "20000"
          npm_config_fetch_retry_maxtimeout: "120000"
          npm_config_fetch_timeout: "600000"
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $mirrors = @("", "https://npmmirror.com/mirrors/electron/")

          for ($i = 1; $i -le 6; $i++) {
            $mirror = $mirrors[($i - 1) % $mirrors.Count]
            if ($mirror) {
              $env:ELECTRON_MIRROR = $mirror
              Write-Host "Attempt $i of 6 using Electron mirror: $mirror"
            } else {
              Remove-Item Env:ELECTRON_MIRROR -ErrorAction SilentlyContinue
              Write-Host "Attempt $i of 6 using default Electron download host"
            }

            npx electron-builder --win nsis --publish never
            if ($LASTEXITCODE -eq 0) { exit 0 }

            Write-Host "electron-builder failed (exit $LASTEXITCODE), cleaning Electron caches and retrying in 20s..."
            Remove-Item -Recurse -Force "$env:LOCALAPPDATA\electron\Cache" -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force "$env:LOCALAPPDATA\electron-builder\Cache" -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force "$env:APPDATA\electron" -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force "$env:APPDATA\electron-builder" -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 20
          }

          exit 1

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LMU-Danmark-Tracker-Setup
          path: companion/release/*Setup*.exe
          if-no-files-found: error

      - name: Publish rolling "latest" release (main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: companion/release/*Setup*.exe
          tag_name: companion-latest
          name: "Companion (seneste build)"
          body: "Automatisk bygget fra main. Hent .exe-filen herunder og kør den for at installere companion-appen."
          prerelease: false
          make_latest: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tagged GitHub Release
        if: startsWith(github.ref, 'refs/tags/companion-v')
        uses: softprops/action-gh-release@v2
        with:
          files: companion/release/*Setup*.exe
          generate_release_notes: true
          name: "Companion ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
